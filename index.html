<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Violation Reference</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f7;
    --surface2: #eaeaef;
    --border: #d8d8e0;
    --text: #111118;
    --text-dim: #444455;
    --text-muted: #9090a8;
    --accent: #d6244d;
    --warn: #b86e00;
    --ok: #0a7a4a;
    --info: #1060b0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  /* Controls */
  .controls {
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 380px;
  }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
  }

  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px 8px 32px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active-all { border-color: var(--text); color: var(--text); background: var(--surface2); }
  .filter-btn.active-against { border-color: var(--accent); color: var(--accent); background: rgba(214,36,77,0.07); }
  .filter-btn.active-depends { border-color: var(--warn); color: var(--warn); background: rgba(184,110,0,0.07); }
  .filter-btn.active-safe { border-color: var(--ok); color: var(--ok); background: rgba(10,122,74,0.07); }

  .count-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    white-space: nowrap;
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 109px);
  }

  /* Sidebar list */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .violation-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .violation-item:hover { background: var(--surface2); }
  .violation-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }

  .violation-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .status-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    width: fit-content;
  }

  .pill-against { background: rgba(214,36,77,0.08); color: var(--accent); border: 1px solid rgba(214,36,77,0.25); }
  .pill-depends { background: rgba(184,110,0,0.08); color: var(--warn); border: 1px solid rgba(184,110,0,0.25); }
  .pill-safe { background: rgba(10,122,74,0.08); color: var(--ok); border: 1px solid rgba(10,122,74,0.25); }

  /* Detail panel */
  .detail {
    overflow-y: auto;
    padding: 28px 32px;
    background: var(--bg);
  }

  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
  }

  .detail-empty-icon { font-size: 36px; opacity: 0.3; }
  .detail-empty-text { font-family: var(--mono); font-size: 13px; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .detail-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    flex: 1;
  }

  .one-liner {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 0 4px 4px 0;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .one-liner-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .grid-1 {
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-label.reject { color: var(--accent); }
  .card-label.allow { color: var(--ok); }
  .card-label.detect { color: var(--info); }
  .card-label.edit { color: var(--warn); }
  .card-label.creative { color: #c4b5fd; }
  .card-label.tos { color: var(--text-muted); }
  .card-label.look { color: var(--text-dim); }

  .card-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .card-body {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-dim);
  }

  .bullet-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bullet-list li {
    padding-left: 14px;
    position: relative;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
  }

  .bullet-list li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--text-muted);
  }

  .tbc-note {
    background: rgba(16,96,176,0.05);
    border: 1px solid rgba(16,96,176,0.2);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--info);
    font-family: var(--mono);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .tbc-icon { margin-right: 6px; }

  .tos-ref {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .no-results {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
  }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .sidebar.mobile-open { display: block; position: fixed; width: 100%; height: calc(100vh - 109px); z-index: 50; }
    .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>

let activeIndex = null;
let currentFilter = 'all';
let currentSearch = '';

function getStatusClass(status) {
  if (status === 'against') return 'pill-against';
  if (status === 'depends') return 'pill-depends';
  return 'pill-safe';
}

function getFilterClass(status) {
  if (status === 'against') return 'against';
  if (status === 'depends') return 'depends';
  return 'safe';
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const filtered = violations.filter((v, i) => {
    const matchesFilter = currentFilter === 'all' || getFilterClass(v.status) === currentFilter;
    const matchesSearch = !currentSearch || v.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
      v.oneLiner.toLowerCase().includes(currentSearch.toLowerCase());
    return matchesFilter && matchesSearch;
  });

  document.getElementById('countBadge').textContent = `${filtered.length} violation${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    sidebar.innerHTML = `<div class="no-results"><span>◇</span><span>No results found</span></div>`;
    return;
  }

  sidebar.innerHTML = filtered.map((v, i) => {
    const realIdx = violations.indexOf(v);
    return `<div class="violation-item ${activeIndex === realIdx ? 'active' : ''}" onclick="selectViolation(${realIdx})">
      <div class="violation-name">${v.name}</div>
      <span class="status-pill ${getStatusClass(v.status)}">${v.status === 'against' ? 'Against TOS' : v.status === 'depends' ? 'Depends' : 'Not Breaking'}</span>
    </div>`;
  }).join('');
}

function makeBullets(arr) {
  if (!arr || arr.length === 0) return '<p class="card-body">None.</p>';
  return `<ul class="bullet-list">${arr.map(item => `<li>${item}</li>`).join('')}</ul>`;
}

function selectViolation(index) {
  activeIndex = index;
  const v = violations[index];

  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-title">${v.name}</div>
      <span class="status-pill ${getStatusClass(v.status)}">${v.statusLabel}</span>
    </div>

    ${v.tbc ? `<div class="tbc-note"><span class="tbc-icon">ℹ</span>${v.tbc}</div>` : ''}

    <div class="one-liner">
      <div class="one-liner-label">One-Line Rule</div>
      ${v.oneLiner}
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-label reject"><span class="card-dot"></span>Not Allowed</div>
        ${makeBullets(v.notAllowed)}
      </div>
      <div class="card">
        <div class="card-label allow"><span class="card-dot"></span>Allowed</div>
        ${makeBullets(v.allowed)}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-label look"><span class="card-dot"></span>What to Look For</div>
        <p class="card-body">${v.lookFor}</p>
      </div>
      <div class="card">
        <div class="card-label detect"><span class="card-dot"></span>How IG Detects It</div>
        <p class="card-body">${v.howDetected}</p>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-label edit"><span class="card-dot"></span>Editing Note</div>
        <p class="card-body">${v.editNote}</p>
      </div>
      <div class="card">
        <div class="card-label creative"><span class="card-dot"></span>Creative Note</div>
        <p class="card-body">${v.creativeNote}</p>
      </div>
    </div>

    <div class="grid-1">
      <div class="card">
        <div class="card-label tos"><span class="card-dot"></span>TOS Reference</div>
        <div class="tos-ref">${v.tos}</div>
      </div>
    </div>
  `;

  renderSidebar();
}

document.getElementById('searchInput').addEventListener('input', function() {
  currentSearch = this.value;
  renderSidebar();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    currentFilter = this.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    const map = { all: 'active-all', against: 'active-against', depends: 'active-depends', safe: 'active-safe' };
    this.classList.add(map[currentFilter]);
    renderSidebar();
  });
});

renderSidebar();
</script>
